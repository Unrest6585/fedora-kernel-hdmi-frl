name: Build and Upload to COPR

on:
  schedule:
    # Check for new kernels daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force a build even if no new kernel'
        required: false
        default: 'false'
        type: boolean
  push:
    branches:
      - main
    paths:
      - 'patches/**'
      - '.github/workflows/build.yml'
      - 'build.sh'

concurrency:
  group: kernel-frl-build
  cancel-in-progress: true

permissions:
  contents: write

env:
  FEDORA_VERSION: '43'

jobs:
  check-kernel:
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    outputs:
      nvr: ${{ steps.check.outputs.nvr }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Install dependencies
        run: dnf install -y koji git rpmdevtools

      - name: Checkout
        uses: actions/checkout@v5

      - name: Check for new kernel version
        id: check
        run: |
          LEGACY_STATE="state/last_nvr"
          DEFAULT_STATE="state/last_nvr_default"
          P2P_STATE="state/last_nvr_p2p"

          get_last_nvr() {
            local state_file="$1"

            if [ -f "${state_file}" ]; then
              tr -d '[:space:]' < "${state_file}"
            elif [ "${state_file}" = "${DEFAULT_STATE}" ] && [ -f "${LEGACY_STATE}" ]; then
              tr -d '[:space:]' < "${LEGACY_STATE}"
            fi
          }

          # Get newest kernel NVR across Koji tags
          NVR=""
          for tag in f${{ env.FEDORA_VERSION }}-updates f${{ env.FEDORA_VERSION }}-updates-candidate f${{ env.FEDORA_VERSION }}; do
            TAG_NVR=$(koji list-tagged --latest "${tag}" kernel 2>/dev/null | awk 'NR>2 && /^kernel-/{print $1; exit}')
            if [ -n "${TAG_NVR}" ]; then
              echo "Found in tag ${tag}: ${TAG_NVR}"
              if [ -z "${NVR}" ] || { rc=0; rpmdev-vercmp "${TAG_NVR}" "${NVR}" &>/dev/null || rc=$?; [ "$rc" -eq 11 ]; }; then
                NVR="${TAG_NVR}"
              fi
            fi
          done

          if [ -z "${NVR}" ]; then
            echo "Error: Could not determine kernel NVR from Koji"
            exit 1
          fi

          echo "Latest Fedora kernel NVR: ${NVR}"
          echo "nvr=${NVR}" >> "$GITHUB_OUTPUT"

          SHOULD_BUILD=false
          HAS_OLDER_STATE=false
          for state_file in "${DEFAULT_STATE}" "${P2P_STATE}"; do
            LAST_NVR=$(get_last_nvr "${state_file}")
            echo "State ${state_file}: ${LAST_NVR:-<none>}"

            if [ -z "${LAST_NVR}" ]; then
              SHOULD_BUILD=true
              continue
            fi

            rc=0
            rpmdev-vercmp "${NVR}" "${LAST_NVR}" &>/dev/null || rc=$?
            if [ "${rc}" -eq 11 ]; then
              SHOULD_BUILD=true
            elif [ "${rc}" -eq 12 ]; then
              HAS_OLDER_STATE=true
              echo "Available kernel ${NVR} is older than recorded ${LAST_NVR} in ${state_file}"
            fi
          done

          if [ "${{ github.event.inputs.force_build }}" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Force build requested"
          elif [ "${HAS_OLDER_STATE}" = "true" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: Koji lookup is older than recorded state"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Push event - rebuilding both variants"
          elif [ "${SHOULD_BUILD}" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "At least one variant needs a rebuild"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "All variants already built for ${NVR}"
          fi

  build:
    needs: check-kernel
    if: needs.check-kernel.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            copr_project: kernel-hdmi-frl
            enable_p2p: '0'
            release_suffix: '.hdmi.frl'
            state_file: state/last_nvr_default
          - variant: p2p
            copr_project: kernel-hdmi-frl-p2p
            enable_p2p: '1'
            release_suffix: '.hdmi.frl.p2p'
            state_file: state/last_nvr_p2p
    container:
      image: fedora:43
    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            git \
            rpm-build \
            rpmdevtools \
            dnf-plugins-core \
            python3-copr \
            copr-cli \
            koji \
            wget \
            cpio

      - name: Checkout
        uses: actions/checkout@v5

      - name: Check variant state
        id: variant
        run: |
          LEGACY_STATE="state/last_nvr"
          STATE_FILE="${{ matrix.state_file }}"
          LAST_NVR=""

          if [ -f "${STATE_FILE}" ]; then
            LAST_NVR=$(tr -d '[:space:]' < "${STATE_FILE}")
          elif [ "${STATE_FILE}" = "state/last_nvr_default" ] && [ -f "${LEGACY_STATE}" ]; then
            LAST_NVR=$(tr -d '[:space:]' < "${LEGACY_STATE}")
          fi

          NVR="${{ needs.check-kernel.outputs.nvr }}"
          SHOULD_BUILD=false

          if [ "${{ github.event.inputs.force_build }}" = "true" ] || [ "${{ github.event_name }}" = "push" ]; then
            SHOULD_BUILD=true
          elif [ -z "${LAST_NVR}" ]; then
            SHOULD_BUILD=true
          else
            rc=0
            rpmdev-vercmp "${NVR}" "${LAST_NVR}" &>/dev/null || rc=$?
            if [ "${rc}" -eq 11 ]; then
              SHOULD_BUILD=true
            fi
          fi

          echo "Last built for ${{ matrix.variant }}: ${LAST_NVR:-<none>}"
          echo "should_build=${SHOULD_BUILD}" >> "$GITHUB_OUTPUT"

      - name: Build SRPM
        if: steps.variant.outputs.should_build == 'true'
        env:
          ENABLE_P2P: ${{ matrix.enable_p2p }}
          KERNEL_NVR: ${{ needs.check-kernel.outputs.nvr }}
        run: |
          rm -f "$GITHUB_WORKSPACE"/kernel-*${{ matrix.release_suffix }}*.src.rpm
          bash "$GITHUB_WORKSPACE/build.sh"

          SRPM=$(ls -1t "$GITHUB_WORKSPACE"/kernel-*${{ matrix.release_suffix }}*.src.rpm | head -1)
          echo "Built SRPM: ${SRPM}"
          echo "PATCHED_SRPM=${SRPM}" >> "$GITHUB_ENV"

      - name: Upload SRPM artifact
        if: steps.variant.outputs.should_build == 'true'
        uses: actions/upload-artifact@v5
        with:
          name: kernel-srpm-${{ matrix.variant }}
          path: kernel-*${{ matrix.release_suffix }}*.src.rpm
          retention-days: 7

      - name: Setup COPR credentials
        if: github.event_name != 'pull_request' && steps.variant.outputs.should_build == 'true'
        run: |
          mkdir -p ~/.config
          printf '%s\n' \
            '[copr-cli]' \
            'login = ${{ secrets.COPR_LOGIN }}' \
            'username = ${{ secrets.COPR_USERNAME }}' \
            'token = ${{ secrets.COPR_TOKEN }}' \
            'copr_url = https://copr.fedorainfracloud.org' \
            > ~/.config/copr

      - name: Upload to COPR
        if: github.event_name != 'pull_request' && steps.variant.outputs.should_build == 'true'
        run: |
          copr-cli build "${{ matrix.copr_project }}" "${PATCHED_SRPM}" \
            --chroot fedora-${{ env.FEDORA_VERSION }}-x86_64 \
            --timeout 25200 \
            --nowait

  publish-release:
    needs:
      - check-kernel
      - build
    if: github.event_name != 'pull_request' && needs.check-kernel.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download SRPM artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: kernel-srpm-*
          merge-multiple: true

      - name: Publish SRPMs to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NVR="${{ needs.check-kernel.outputs.nvr }}"

          if ! ls artifacts/*.src.rpm >/dev/null 2>&1; then
            echo "No SRPM artifacts to publish"
            exit 1
          fi

          if gh release view "${NVR}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "${NVR}" artifacts/*.src.rpm \
              --repo "${{ github.repository }}" \
              --clobber
          else
            gh release create "${NVR}" \
              --repo "${{ github.repository }}" \
              --target main \
              --title "kernel ${NVR}" \
              --notes "Patched kernel SRPMs for ${NVR} with HDMI FRL support" \
              artifacts/*.src.rpm
          fi

  update-state:
    needs:
      - check-kernel
      - build
      - publish-release
    if: github.event_name != 'pull_request' && needs.check-kernel.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Update state files
        run: |
          NVR="${{ needs.check-kernel.outputs.nvr }}"
          mkdir -p state
          printf '%s\n' "${NVR}" > state/last_nvr_default
          printf '%s\n' "${NVR}" > state/last_nvr_p2p
          rm -f state/last_nvr

      - name: Commit state update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A state
          if git diff --cached --quiet; then
            echo "No state change to commit"
          else
            git commit -m "state: update last built NVRs to ${{ needs.check-kernel.outputs.nvr }}"
            git push
          fi
